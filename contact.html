<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Alfajr Cambodia</title>
    
    <!-- Favicon Links -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon/favicon-16x16.png">
    <link rel="manifest" href="assets/images/favicon/site.webmanifest">
    <link rel="shortcut icon" href="assets/images/favicon/favicon.ico">

    <!-- Tailwind and Global Styles -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="assets/css/tailwind-output.css" rel="stylesheet">
    <link href="assets/css/global.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div id="header-placeholder"></div>

    <section class="py-12">
        <div class="container mx-auto">
            <h1 class="text-4xl font-bold text-center mb-6">Contact Us</h1>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <h2 class="text-2xl font-semibold mb-4">Get in Touch</h2>
                    <p>Feel free to reach out to us for any inquiries or assistance. We're here to help!</p>
                    <form class="mt-6">
                        <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
                        <input type="text" id="name" class="w-full p-2 border rounded-md" required>

                        <label for="email" class="block text-sm font-medium text-gray-700 mt-4">Email</label>
                        <input type="email" id="email" class="w-full p-2 border rounded-md" required>

                        <label for="message" class="block text-sm font-medium text-gray-700 mt-4">Message</label>
                        <textarea id="message" class="w-full p-2 border rounded-md" rows="4" required></textarea>

                        <button type="submit" class="mt-4 px-6 py-2 bg-orange-600 text-white rounded-lg hover:bg-orange-700">Send Message</button>
                    </form>
                </div>
                <div>
                    <h2 class="text-2xl font-semibold mb-4">Our Location</h2>
                    <p>Visit us at:</p>
                    <p>Alfajr Cambodia, Phnom Penh, Cambodia</p>
                    <iframe class="mt-4 w-full h-96 rounded-lg shadow-lg" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3919.649041853445!2d104.89017731480615!3d11.556373991797871!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x310951be3f7b3b11%3A0x5a5ab7580c6f8357!2sPhnom%20Penh%20International%20Airport!5e0!3m2!1sen!2skh!4v1667541347932!5m2!1sen!2skh" frameborder="0" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script>
        async function loadHeader() {
            const response = await fetch('pages/header.html');
            document.getElementById('header-placeholder').innerHTML = await response.text();
        }
        async function loadFooter() {
            const response = await fetch('pages/footer.html');
            document.getElementById('footer-placeholder').innerHTML = await response.text();
        }
        document.addEventListener('DOMContentLoaded', () => {
            loadHeader();
            loadFooter();
        });
    </script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    async function loadHeader() {
        try {
            const response = await fetch('pages/header.html');
            if (!response.ok) {
                throw new Error('Failed to load header');
            }
            const headerContent = await response.text();
            document.getElementById('header-placeholder').innerHTML = headerContent;

            // Initialize menu toggle after header loads
            const menuToggle = document.getElementById('menu-toggle');
            const mobileNavMenu = document.getElementById('mobile-nav-menu');
            if (menuToggle && mobileNavMenu) {
                menuToggle.addEventListener('click', () => {
                    mobileNavMenu.classList.toggle('hidden');
                });

                document.addEventListener('click', (event) => {
                    if (!mobileNavMenu.contains(event.target) && !menuToggle.contains(event.target)) {
                        mobileNavMenu.classList.add('hidden');
                    }
                });
            } else {
                console.error('Menu toggle or mobile nav menu not found.');
            }
        } catch (error) {
            console.error('Error loading header:', error);
        }
    }

    loadHeader();
});
</script>
</body>
</html>
